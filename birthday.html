<!DOCTYPE html>
<html lang="gu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Happy Birthday</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: linear-gradient(135deg, rgba(0, 0, 0, 0.7), rgba(26, 26, 26, 0.7)), url('photos/images/1.jpg') center/cover no-repeat;
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow-x: hidden;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .birthday-container {
            text-align: center;
            z-index: 10;
            position: relative;
        }

        .birthday-text {
            color: #ffffff;
            font-size: 8rem;
            font-weight: bold;
            text-shadow: 0 0 30px rgba(255, 255, 255, 0.5);
            opacity: 0;
            transform: translateY(-150px);
            animation: dropDown 3s ease-out forwards;
            margin-bottom: 3rem;
        }

        .cake-container {
            margin: 3rem 0;
            opacity: 0;
            animation: fadeInScale 2s ease-out 1s forwards;
        }

        .wish-button {
            background: linear-gradient(135deg, #FF69B4, #FF1493);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 1.2rem;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            margin-top: 2rem;
            box-shadow: 0 10px 25px rgba(255, 105, 180, 0.4);
            transition: all 0.3s ease;
            animation: fadeInScale 2s ease-out 3s forwards;
            opacity: 0;
        }

        .wish-button:hover {
            transform: translateY(-3px) scale(1.05);
            box-shadow: 0 15px 35px rgba(255, 105, 180, 0.6);
            background: linear-gradient(135deg, #FF1493, #FF69B4);
        }

        .wish-button:active {
            transform: translateY(-1px) scale(1.02);
        }

        .cake {
            position: relative;
            width: 250px;
            height: 180px;
            margin: 0 auto;
        }

        .cake-layer {
            position: absolute;
            width: 250px;
            height: 60px;
            background: linear-gradient(90deg, #8B4513, #A0522D, #8B4513);
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(255, 255, 255, 0.2);
        }

        .cake-layer:nth-child(1) {
            bottom: 0;
            z-index: 1;
        }

        .cake-layer:nth-child(2) {
            bottom: 50px;
            width: 220px;
            left: 15px;
            background: linear-gradient(90deg, #FFB6C1, #FFC0CB, #FFB6C1);
            z-index: 2;
        }

        .cake-layer:nth-child(3) {
            bottom: 100px;
            width: 190px;
            left: 30px;
            background: linear-gradient(90deg, #FF69B4, #FF1493, #FF69B4);
            z-index: 3;
        }

        .candles {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 25px;
        }

        .candle {
            width: 18px;
            height: 35px;
            background: linear-gradient(90deg, #FFE4B5, #FFDEAD, #FFE4B5);
            border-radius: 4px;
            position: relative;
            animation: flicker 3s infinite;
        }

        .flame {
            position: absolute;
            top: -18px;
            left: 50%;
            transform: translateX(-50%);
            width: 25px;
            height: 30px;
            background: radial-gradient(circle, #FFA500, #FF4500);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            animation: flameAnimation 1s infinite alternate;
            box-shadow: 0 0 30px #FFA500;
        }

        .balloons {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .balloon {
            position: absolute;
            font-size: 4rem;
            animation: float 8s infinite ease-in-out, bounce 2s infinite alternate, glow 3s infinite alternate, rotate 6s infinite linear;
            animation-delay: 3s;
            opacity: 0;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
        }

        .balloon1 {
            left: 10%;
            top: 15%;
            animation-delay: 1.5s, 1.5s, 1.5s, 1.5s;
        }

        .balloon2 {
            left: 25%;
            top: 8%;
            animation-delay: 1.8s, 1.8s, 1.8s, 1.8s;
        }

        .balloon3 {
            right: 25%;
            top: 12%;
            animation-delay: 2s, 2s, 2s, 2s;
        }

        .balloon4 {
            right: 10%;
            top: 20%;
            animation-delay: 3s, 3s, 3s, 3s;
        }

        .balloon5 {
            left: 50%;
            top: 5%;
            animation-delay: 4s, 4s, 4s, 4s;
        }

        .balloons-bottom {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 5;
        }

        .balloon-bottom {
            position: absolute;
            font-size: 4rem;
            animation: float 8s infinite ease-in-out, bounce 2s infinite alternate, glow 3s infinite alternate, rotate 6s infinite linear;
            animation-delay: 3s;
            opacity: 0;
            filter: drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
        }

        .balloon-bottom1 {
            left: 10%;
            bottom: 15%;
            animation-delay: 1.5s, 1.5s, 1.5s, 1.5s;
        }

        .balloon-bottom2 {
            left: 25%;
            bottom: 8%;
            animation-delay: 1.8s, 1.8s, 1.8s, 1.8s;
        }

        .balloon-bottom3 {
            right: 25%;
            bottom: 12%;
            animation-delay: 2s, 2s, 2s, 2s;
        }

        .balloon-bottom4 {
            right: 10%;
            bottom: 20%;
            animation-delay: 3s, 3s, 3s, 3s;
        }

        .balloon-bottom5 {
            left: 50%;
            bottom: 5%;
            animation-delay: 4s, 4s, 4s, 4s;
        }

        .sparkles {
            position: fixed;
            width: 100%;
            height: 100%;
            top: 0;
            left: 0;
            pointer-events: none;
            z-index: 2;
        }

        .sparkle {
            position: absolute;
            color: #FFD700;
            font-size: 20px;
            animation: sparkleFloat 4s infinite linear;
            animation-delay: 3s;
            opacity: 0;
        }

        @keyframes dropDown {
            0% {
                opacity: 0;
                transform: translateY(-150px);
            }
            70% {
                opacity: 1;
                transform: translateY(20px);
            }
            100% {
                opacity: 1;
                transform: translateY(0);
            }
        }

        @keyframes fadeInScale {
            0% {
                opacity: 0;
                transform: scale(0.5);
            }
            100% {
                opacity: 1;
                transform: scale(1);
            }
        }

        @keyframes float {
            0%, 100% {
                transform: translateY(0px) rotate(-8deg);
                opacity: 1;
            }
            50% {
                transform: translateY(-30px) rotate(8deg);
                opacity: 1;
            }
        }

        @keyframes bounce {
            0%, 100% {
                transform: translateY(0px) scale(1);
            }
            50% {
                transform: translateY(-10px) scale(1.15);
            }
        }

        @keyframes glow {
            0% {
                filter: brightness(1) drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
            }
            50% {
                filter: brightness(1.4) drop-shadow(0 0 25px rgba(255, 255, 255, 0.9));
            }
            100% {
                filter: brightness(1) drop-shadow(0 0 15px rgba(255, 255, 255, 0.6));
            }
        }

        @keyframes rotate {
            0% {
                transform: rotate(0deg);
            }
            100% {
                transform: rotate(360deg);
            }
        }

        @keyframes flicker {
            0%, 100% {
                opacity: 1;
            }
            50% {
                opacity: 0.8;
            }
        }

        @keyframes backgroundZoom {
            0% {
                transform: scale(1) translateX(0);
                opacity: 0.4;
                filter: brightness(1.2) contrast(1.1);
            }
            50% {
                transform: scale(1.2) translateX(10px);
                opacity: 0.6;
                filter: brightness(1.4) contrast(1.2);
            }
            100% {
                transform: scale(1) translateX(0);
                opacity: 0.4;
                filter: brightness(1.2) contrast(1.1);
            }
        }

        @keyframes backgroundMove {
            0% {
                background-position: 0% 50%;
            }
            25% {
                background-position: 25% 50%;
            }
            50% {
                background-position: 50% 50%;
            }
            75% {
                background-position: 75% 50%;
            }
            100% {
                background-position: 100% 50%;
            }
        }

        @keyframes gradientShift {
            0% {
                background: linear-gradient(135deg, rgba(255, 105, 180, 0.3), rgba(255, 20, 147, 0.3));
            }
            50% {
                background: linear-gradient(135deg, rgba(255, 20, 147, 0.4), rgba(255, 105, 180, 0.4));
            }
            100% {
                background: linear-gradient(135deg, rgba(255, 105, 180, 0.3), rgba(255, 20, 147, 0.3));
            }
        }

        @keyframes flameAnimation {
            0% {
                transform: translateX(-50%) scale(1) rotate(-3deg);
            }
            100% {
                transform: translateX(-50%) scale(1.2) rotate(3deg);
            }
        }

        @keyframes sparkleFloat {
            0% {
                opacity: 0;
                transform: translateY(100vh) rotate(0deg);
            }
            10% {
                opacity: 1;
            }
            90% {
                opacity: 1;
            }
            100% {
                opacity: 0;
                transform: translateY(-100vh) rotate(360deg);
            }
        }

        @media (max-width: 768px) {
            .birthday-text {
                font-size: 5rem;
                margin-bottom: 2rem;
            }
            
            .cake-container {
                margin: 2rem 0;
            }
            
            .cake {
                width: 220px;
                height: 160px;
            }
            
            .cake-layer {
                width: 220px;
                height: 55px;
            }
            
            .cake-layer:nth-child(2) {
                width: 200px;
                left: 10px;
            }
            
            .cake-layer:nth-child(3) {
                width: 180px;
                left: 20px;
            }
            
            .candles {
                gap: 20px;
            }
            
            .candle {
                width: 16px;
                height: 30px;
            }
            
            .flame {
                width: 22px;
                height: 25px;
            }
            
            .balloon {
                font-size: 3.5rem;
            }
            
            .wish-button {
                padding: 15px 35px;
                font-size: 1.1rem;
                margin-top: 1.5rem;
            }
        }

        @media (max-width: 480px) {
            .birthday-text {
                font-size: 4rem;
                margin-bottom: 1.5rem;
            }
            
            .cake-container {
                margin: 1.5rem 0;
            }
            
            .cake {
                width: 180px;
                height: 130px;
            }
            
            .cake-layer {
                width: 180px;
                height: 45px;
            }
            
            .cake-layer:nth-child(2) {
                width: 160px;
                left: 10px;
            }
            
            .cake-layer:nth-child(3) {
                width: 140px;
                left: 20px;
            }
            
            .candles {
                gap: 15px;
            }
            
            .candle {
                width: 14px;
                height: 25px;
            }
            
            .flame {
                width: 20px;
                height: 22px;
            }
            
            .balloon {
                font-size: 3rem;
            }
            
            .wish-button {
                padding: 12px 30px;
                font-size: 1rem;
                margin-top: 1rem;
            }
        }

        @media (max-width: 360px) {
            .birthday-text {
                font-size: 3rem;
                margin-bottom: 1rem;
            }
            
            .cake-container {
                margin: 1rem 0;
            }
            
            .cake {
                width: 150px;
                height: 110px;
            }
            
            .cake-layer {
                width: 150px;
                height: 38px;
            }
            
            .cake-layer:nth-child(2) {
                width: 130px;
                left: 10px;
            }
            
            .cake-layer:nth-child(3) {
                width: 110px;
                left: 20px;
            }
            
            .candles {
                gap: 12px;
            }
            
            .candle {
                width: 12px;
                height: 22px;
            }
            
            .flame {
                width: 18px;
                height: 20px;
            }
            
            .balloon {
                font-size: 2.5rem;
            }
            
            .wish-button {
                padding: 10px 25px;
                font-size: 0.9rem;
                margin-top: 0.8rem;
            }
        }
    </style>
</head>

<body>
    <div class="birthday-container">
        <h1 class="birthday-text">Happy Birthday <br> Netra</h1>

        <div class="cake-container">
            <div class="cake">
                <div class="cake-layer"></div>
                <div class="cake-layer"></div>
                <div class="cake-layer"></div>
                <div class="candles">
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                    <div class="candle">
                        <div class="flame"></div>
                    </div>
                </div>
            </div>
            
            <button class="wish-button" onclick="openWishPage()">My Wish</button>
        </div>
    </div>

    <div class="balloons">
        <div class="balloon balloon1">🎈</div>
        <div class="balloon balloon2">🎈</div>
        <div class="balloon balloon3">🎈</div>
        <div class="balloon balloon4">🎈</div>
        <div class="balloon balloon5">🎈</div>
    </div>

    <div class="balloons-bottom">
        <div class="balloon-bottom balloon-bottom1">🎈</div>
        <div class="balloon-bottom balloon-bottom2">🎈</div>
        <div class="balloon-bottom balloon-bottom3">🎈</div>
        <div class="balloon-bottom balloon-bottom4">🎈</div>
        <div class="balloon-bottom balloon-bottom5">🎈</div>
    </div>

    <!-- Background Music
    <audio id="backgroundMusic" loop>
        <source src="song/music/song.mp4" type="audio/mp4">
        <source src="song/music/song.mp4" type="audio/mpeg">
    </audio> -->

    <div class="sparkles">
        <div class="sparkle" style="left: 20%; animation-delay: 0s;">✨</div>
        <div class="sparkle" style="left: 40%; animation-delay: 1s;">⭐</div>
        <div class="sparkle" style="left: 60%; animation-delay: 2s;">✨</div>
        <div class="sparkle" style="left: 80%; animation-delay: 3s;">⭐</div>
    </div>

    <script>
        // Continue music from index page
        document.addEventListener('DOMContentLoaded', function() {
            const music = document.getElementById('backgroundMusic');
            const musicPlaying = sessionStorage.getItem('musicPlaying');
            const savedTime = sessionStorage.getItem('musicCurrentTime');
            
            music.volume = 0.8;
            
            if (musicPlaying === 'true') {
                // Restore music position and continue playing
                if (savedTime) {
                    music.currentTime = parseFloat(savedTime);
                }
                music.play().catch(function(error) {
                    console.log("Music continuation failed:", error);
                });
            }
        });

        // Make elements visible immediately
        setTimeout(() => {
            const sparkles = document.querySelectorAll('.sparkle');
            sparkles.forEach(sparkle => {
                sparkle.style.opacity = '1';
            });
            
            const balloons = document.querySelectorAll('.balloon, .balloon-bottom');
            balloons.forEach(balloon => {
                balloon.style.opacity = '1';
            });
        }, 100);

        function makeWish() {
            // Create wish effect
            const wishEffect = document.createElement('div');
            wishEffect.innerHTML = '🌟 Make a Wish! 🌟';
            wishEffect.style.cssText = `
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: linear-gradient(135deg, #FF69B4, #FF1493);
                color: white;
                padding: 20px 40px;
                border-radius: 50px;
                font-size: 1.5rem;
                font-weight: bold;
                z-index: 1000;
                animation: wishAnimation 2s ease-out forwards;
                box-shadow: 0 10px 30px rgba(255, 105, 180, 0.5);
            `;
            document.body.appendChild(wishEffect);
            
            // Remove wish effect after animation
            setTimeout(() => {
                wishEffect.remove();
            }, 2000);
            
            // Add extra sparkles
            for (let i = 0; i < 10; i++) {
                setTimeout(() => {
                    createExtraSparkle();
                }, i * 100);
            }
        }

        function openWishPage() {
            // Get name from URL parameter
            function getUrlParameter(name) {
                name = name.replace(/[\[]/, '\\[').replace(/[\]]/, '\\]');
                var regex = new RegExp('[\\?&]' + name + '=([^&#]*)');
                var results = regex.exec(location.search);
                return results === null ? '' : decodeURIComponent(results[1].replace(/\+/g, ' '));
            }

            const name = getUrlParameter('name') || 'Netra';
            window.location.href = `wish.html?name=${encodeURIComponent(name)}`;
        }

        function createExtraSparkle() {
            const sparkle = document.createElement('div');
            sparkle.innerHTML = '✨';
            sparkle.style.cssText = `
                position: fixed;
                left: ${Math.random() * 100}%;
                top: ${Math.random() * 100}%;
                font-size: ${20 + Math.random() * 20}px;
                animation: sparkleFloat 3s ease-out forwards;
                z-index: 999;
            `;
            document.body.appendChild(sparkle);
            
            setTimeout(() => {
                sparkle.remove();
            }, 3000);
        }

        // Add wish animation keyframes
        const wishStyle = document.createElement('style');
        wishStyle.textContent = `
            @keyframes wishAnimation {
                0% {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(0.5);
                }
                50% {
                    opacity: 1;
                    transform: translate(-50%, -50%) scale(1.2);
                }
                100% {
                    opacity: 0;
                    transform: translate(-50%, -50%) scale(1.5);
                }
            }
        `;
        document.head.appendChild(wishStyle);
    </script>

    <script>
        // Auto-scroll to top on page refresh
        window.addEventListener('beforeunload', function () {
            window.scrollTo(0, 0);
        });

        // Also scroll to top on page load
        window.addEventListener('load', function () {
            window.scrollTo({
                top: 0,
                behavior: 'smooth'
            });
    });
    </script>
</body>
</html>
